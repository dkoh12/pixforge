<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pixforge 🔨</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<header>
  <h1>🔨 pixforge</h1>
  <p>Image conversion & transformation — right in your browser</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div id="drop-placeholder">
      <div id="drop-icon">🖼️</div>
      <div id="drop-text">Drag & drop an image, or <span>browse</span></div>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview" />
      <div id="file-info"></div>
    </div>
  </div>

  <!-- Options -->
  <div class="options">
    <div class="option-group">
      <label>Output Format</label>
      <select id="format">
        <option value=".jpg">JPEG (.jpg)</option>
        <option value=".png">PNG (.png)</option>
        <option value=".webp">WebP (.webp)</option>
        <option value=".gif">GIF (.gif)</option>
        <option value=".tiff">TIFF (.tiff)</option>
        <option value=".bmp">BMP (.bmp)</option>
      </select>
    </div>

    <div class="option-group">
      <label>Quality (JPEG/WebP)</label>
      <input type="number" id="quality" value="85" min="1" max="100" />
    </div>

    <div class="option-group">
      <label>Scale (%)</label>
      <input type="number" id="scale" placeholder="e.g. 50" min="1" max="1000" />
    </div>

    <div class="option-group">
      <label>DPI</label>
      <input type="number" id="dpi" placeholder="e.g. 300" min="1" />
    </div>

    <div class="option-group">
      <label>Width (px)</label>
      <input type="number" id="width" placeholder="auto aspect ratio" min="1" />
    </div>

    <div class="option-group">
      <label>Height (px)</label>
      <input type="number" id="height" placeholder="auto aspect ratio" min="1" />
    </div>

    <div class="option-group">
      <label>Rotate (degrees)</label>
      <select id="rotate">
        <option value="">None</option>
        <option value="90">90°</option>
        <option value="180">180°</option>
        <option value="270">270°</option>
      </select>
    </div>

    <div class="option-group">
      <label>Flip</label>
      <select id="flip">
        <option value="">None</option>
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
    </div>

    <div class="option-group full">
      <div class="checkbox-row">
        <input type="checkbox" id="grayscale" />
        <label for="grayscale">Convert to Grayscale</label>
      </div>
    </div>
  </div>

  <button id="convert-btn" disabled>Convert & Download</button>
  <div id="status"></div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
