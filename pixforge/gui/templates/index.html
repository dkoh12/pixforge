<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pixforge 🔨</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 36px;
      text-align: center;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #888;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: #f97316;
      background: rgba(249, 115, 22, 0.05);
    }

    #drop-zone.has-image {
      padding: 16px;
      border-style: solid;
      border-color: #333;
    }

    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #drop-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #drop-text { color: #888; font-size: 0.95rem; }
    #drop-text span { color: #f97316; text-decoration: underline; cursor: pointer; }

    #preview-wrap { display: none; }
    #preview-wrap img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }
    #file-info {
      text-align: center;
      color: #888;
      font-size: 0.82rem;
      margin-top: 10px;
    }

    /* Options */
    .options {
      margin-top: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .option-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      color: #aaa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="number"], select {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: #f97316;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #f97316;
      cursor: pointer;
    }

    .checkbox-row label {
      text-transform: none;
      font-size: 0.9rem;
      color: #ccc;
      letter-spacing: 0;
      cursor: pointer;
    }

    /* Convert button */
    #convert-btn {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: #f97316;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    #convert-btn:hover { background: #ea6c0a; }
    #convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status */
    #status {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      min-height: 22px;
      color: #888;
    }

    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }
  </style>
</head>
<body>

<header>
  <h1>🔨 pixforge</h1>
  <p>Image conversion & transformation — right in your browser</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" />
    <div id="drop-placeholder">
      <div id="drop-icon">🖼️</div>
      <div id="drop-text">Drag & drop an image, or <span>browse</span></div>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview" />
      <div id="file-info"></div>
    </div>
  </div>

  <!-- Options -->
  <div class="options">
    <div class="option-group">
      <label>Output Format</label>
      <select id="format">
        <option value=".jpg">JPEG (.jpg)</option>
        <option value=".png">PNG (.png)</option>
        <option value=".webp">WebP (.webp)</option>
        <option value=".gif">GIF (.gif)</option>
        <option value=".tiff">TIFF (.tiff)</option>
        <option value=".bmp">BMP (.bmp)</option>
      </select>
    </div>

    <div class="option-group">
      <label>Quality (JPEG/WebP)</label>
      <input type="number" id="quality" value="85" min="1" max="100" />
    </div>

    <div class="option-group">
      <label>Scale (%)</label>
      <input type="number" id="scale" placeholder="e.g. 50" min="1" max="1000" />
    </div>

    <div class="option-group">
      <label>DPI</label>
      <input type="number" id="dpi" placeholder="e.g. 300" min="1" />
    </div>

    <div class="option-group">
      <label>Width (px)</label>
      <input type="number" id="width" placeholder="auto aspect ratio" min="1" />
    </div>

    <div class="option-group">
      <label>Height (px)</label>
      <input type="number" id="height" placeholder="auto aspect ratio" min="1" />
    </div>

    <div class="option-group">
      <label>Rotate (degrees)</label>
      <select id="rotate">
        <option value="">None</option>
        <option value="90">90°</option>
        <option value="180">180°</option>
        <option value="270">270°</option>
      </select>
    </div>

    <div class="option-group">
      <label>Flip</label>
      <select id="flip">
        <option value="">None</option>
        <option value="horizontal">Horizontal</option>
        <option value="vertical">Vertical</option>
      </select>
    </div>

    <div class="option-group full">
      <div class="checkbox-row">
        <input type="checkbox" id="grayscale" />
        <label for="grayscale">Convert to Grayscale</label>
      </div>
    </div>
  </div>

  <button id="convert-btn" disabled>Convert & Download</button>
  <div id="status"></div>
</div>

<script>
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  const previewWrap = document.getElementById("preview-wrap");
  const dropPlaceholder = document.getElementById("drop-placeholder");
  const previewImg = document.getElementById("preview-img");
  const fileInfo = document.getElementById("file-info");
  const convertBtn = document.getElementById("convert-btn");
  const status = document.getElementById("status");

  let selectedFile = null;

  function loadFile(file) {
    if (!file || !file.type.startsWith("image/")) {
      setStatus("Please drop a valid image file.", "error");
      return;
    }
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;

    const img = new window.Image();
    img.onload = () => {
      fileInfo.textContent = `${file.name} · ${img.naturalWidth}×${img.naturalHeight}px · ${(file.size / 1024).toFixed(1)} KB`;
    };
    img.src = url;

    dropPlaceholder.style.display = "none";
    previewWrap.style.display = "block";
    dropZone.classList.add("has-image");
    convertBtn.disabled = false;
    setStatus("");
  }

  fileInput.addEventListener("change", e => loadFile(e.target.files[0]));

  dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    loadFile(e.dataTransfer.files[0]);
  });

  function setStatus(msg, type = "") {
    status.textContent = msg;
    status.className = type;
  }

  convertBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    convertBtn.disabled = true;
    setStatus("Converting...");

    const form = new FormData();
    form.append("image", selectedFile);
    form.append("format", document.getElementById("format").value);
    form.append("quality", document.getElementById("quality").value);
    form.append("scale", document.getElementById("scale").value);
    form.append("dpi", document.getElementById("dpi").value);
    form.append("width", document.getElementById("width").value);
    form.append("height", document.getElementById("height").value);
    form.append("rotate", document.getElementById("rotate").value);
    form.append("flip", document.getElementById("flip").value);
    form.append("grayscale", document.getElementById("grayscale").checked ? "true" : "false");

    try {
      const res = await fetch("/convert", { method: "POST", body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Conversion failed");
      }

      const blob = await res.blob();
      const disposition = res.headers.get("Content-Disposition") || "";
      const match = disposition.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : "converted_image";

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();

      setStatus(`✅ Downloaded as ${filename}`, "success");
    } catch (err) {
      setStatus(`❌ ${err.message}`, "error");
    } finally {
      convertBtn.disabled = false;
    }
  });
</script>

</body>
</html>
